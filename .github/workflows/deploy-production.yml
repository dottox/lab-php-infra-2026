name: Deploy production

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-production]
  # optional:
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Upload infra files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "docker-compose.yml,nginx,scripts"
          target: "/opt/proconnect"
          overwrite: true
          strip_components: 0

      - name: Deploy on Hetzner
        uses: appleboy/ssh-action@v1.2.2
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          envs: GHCR_USERNAME,GHCR_READ_TOKEN,LIVEKIT_API_KEY,LIVEKIT_API_SECRET
          script: |
            set -eu

            mkdir -p /opt/proconnect
            mkdir -p /opt/proconnect/docker/livekit

            cat > /opt/proconnect/docker/livekit/livekit.yaml <<EOF
            port: 7880

            bind_addresses:
              - ""

            rtc:
              tcp_port: 7881
              port_range_start: 60000
              port_range_end: 60100
              use_external_ip: true

            keys:
              ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
            EOF

            chmod 600 /opt/proconnect/docker/livekit/livekit.yaml

            cat > /opt/proconnect/.env <<EOF
            APP_NAME=ProConnect
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=false
            APP_URL=https://${{ vars.API_DOMAIN }}
            FRONTEND_URL=https://${{ vars.APP_DOMAIN }}

            APP_DOMAIN=${{ vars.APP_DOMAIN }}
            API_DOMAIN=${{ vars.API_DOMAIN }}

            BACKEND_IMAGE=${{ vars.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ vars.FRONTEND_IMAGE }}

            APP_LOCALE=en
            APP_FALLBACK_LOCALE=en
            APP_FAKER_LOCALE=en_US

            APP_MAINTENANCE_DRIVER=file
            APP_MAINTENANCE_STORE=database

            BCRYPT_ROUNDS=12

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_DEPRECATIONS_CHANNEL=null
            LOG_LEVEL=info

            DB_CONNECTION=pgsql
            DB_HOST=postgres
            DB_PORT=5432
            DB_DATABASE=${{ vars.DB_DATABASE }}
            DB_USERNAME=${{ vars.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            SESSION_ENCRYPT=false
            SESSION_PATH=/
            SESSION_DOMAIN=null

            BROADCAST_CONNECTION=log
            FILESYSTEM_DISK=local
            QUEUE_CONNECTION=redis

            CACHE_STORE=redis
            CACHE_PREFIX=

            REDIS_CLIENT=phpredis
            REDIS_HOST=redis
            REDIS_PASSWORD=null
            REDIS_PORT=6379

            MONGODB_USERNAME=${{ vars.MONGODB_USERNAME }}
            MONGODB_PASSWORD=${{ secrets.MONGODB_PASSWORD }}
            MONGODB_DATABASE=${{ vars.MONGODB_DATABASE }}
            MONGODB_PORT=27017
            MONGODB_URI=mongodb://${{ vars.MONGODB_USERNAME }}:${{ secrets.MONGODB_PASSWORD }}@mongodb:27017/${{ vars.MONGODB_DATABASE }}?authSource=admin
            MONGODB_SERVER_SELECTION_TIMEOUT_MS=500
            MONGODB_CONNECT_TIMEOUT_MS=500

            HORIZON_PATH=horizon

            MAIL_MAILER=${{ vars.MAIL_MAILER }}
            MAIL_SCHEME=null
            MAIL_HOST=${{ vars.MAIL_HOST }}
            MAIL_PORT=${{ vars.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_ADDRESS=${{ vars.MAIL_FROM_ADDRESS }}
            MAIL_FROM_NAME=ProConnect
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}

            MAPBOX_PUBLIC_TOKEN=${{ vars.MAPBOX_PUBLIC_TOKEN }}

            REVIEW_EDIT_WINDOW_DAYS=${{ vars.REVIEW_EDIT_WINDOW_DAYS }}
            PAYMENTS_CURRENCY=${{ vars.PAYMENTS_CURRENCY }}
            PAYMENT_INTENT_EXPIRATION_MINUTES=${{ vars.PAYMENT_INTENT_EXPIRATION_MINUTES }}

            VIDEO_PROVIDER=${{ vars.VIDEO_PROVIDER }}
            VIDEO_JOIN_BEFORE_MINUTES=${{ vars.VIDEO_JOIN_BEFORE_MINUTES }}
            VIDEO_JOIN_AFTER_MINUTES=${{ vars.VIDEO_JOIN_AFTER_MINUTES }}
            VIDEO_SIMULATOR_BASE_URL=${{ vars.VIDEO_SIMULATOR_BASE_URL }}

            LIVEKIT_URL=${{ vars.LIVEKIT_URL }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_TOKEN_TTL_SECONDS=${{ vars.LIVEKIT_TOKEN_TTL_SECONDS }}

            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=${{ vars.AWS_DEFAULT_REGION }}
            AWS_BUCKET=${{ vars.AWS_BUCKET }}
            AWS_USE_PATH_STYLE_ENDPOINT=false

            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=https://${{ vars.API_DOMAIN }}/api/v1/auth/oauth/google/callback

            GITHUB_CLIENT_ID=${{ vars.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
            GITHUB_REDIRECT_URI=https://${{ vars.API_DOMAIN }}/api/v1/auth/oauth/github/callback

            MICROSOFT_CLIENT_ID=${{ vars.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ secrets.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_REDIRECT_URI=https://${{ vars.API_DOMAIN }}/api/v1/auth/oauth/microsoft/callback

            SEED_DEMO_DATA=false
            EOF

            cd /opt/proconnect

            ls -la
            test -f docker-compose.yml
            test -f .env
            test -f docker/livekit/livekit.yaml

            chmod +x scripts/deploy.sh

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            ./scripts/deploy.sh
